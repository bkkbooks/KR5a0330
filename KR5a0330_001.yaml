body:
  text: 杜蘭香別傳杜蘭香自稱南陽人以建興四年春數詣張傅傅年十七望見車在門外婢通言阿母所生遣授配君君不可不敬從傅先改名碩碩呼女前視可十七八說事邈然久遠有婢子二人大者萱支小者松支鈿車青牛上飲食皆備作詩曰阿母處靈嶽時遊雲霄際衆女侍羽儀不出墉宮外飄輪送我來且復恥塵穢從我與福俱嫌我與禍會至其年八月旦來復作詩曰逍遙雲霧間呼嗟發九疑流女不稽路弱水何不之出薯蕷子三枚大如雞子云食此令君不畏風波辟寒溫碩食二留一不肯令碩盡食言本為君作妻情無曠遠以年命未合其小乖太歲東方卯當還求君蘭香降張碩碩問禱祀何如香曰消摩自可愈疾淫祀無益蘭香以藥為消摩
